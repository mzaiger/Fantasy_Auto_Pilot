name: Daily MLB Schedule Sync

on:
  schedule:
    # This runs at 04:00 UTC every day. 
    # Note: 4am Central Time is 09:00 UTC (during Daylight Savings).
    # Adjust to '0 9 * * *' if you want 4am Nebraska time.
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Schedule Script
        run: python Fantasy_Auto_Pilot_Schedule_Make.py
