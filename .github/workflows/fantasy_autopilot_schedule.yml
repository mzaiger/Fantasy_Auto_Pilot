name: Daily MLB Sync to Make.com

on:
  schedule:
    - cron: '0 9 * * *' # 4 AM Central Time
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests requests-oauthlib

      - name: 1. Generate JSON (Get Games)
        env:
          YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_TOKEN: ${{ secrets.YAHOO_TOKEN }}
        run: python Fantasy_Auto_Pilot_Get_Games.py

      - name: 2. Process Schedule (Schedule Make)
        run: python Fantasy_Auto_Pilot_Schedule_Make.py

      - name: 3. Send to Make.com
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d @mlb_games.json \
          ${{ secrets.MAKE_WEBHOOK_URL }}

      - name: 4. Save Copy to Repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add mlb_games.json
          git diff-index --quiet HEAD || git commit -m "Update MLB data: $(date +'%Y-%m-%d')"
          git push
