<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Fantasy Baseball Auto Pilot</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #007bff;
            --secondary: #6c757d;
            --accent: #28a745;
            --text: #333;
            --border: #dee2e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
        }

        h1 { margin: 0; color: var(--primary); }
        h2 { border-bottom: 2px solid var(--border); padding-bottom: 5px; margin-top: 40px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 900px) {
            .grid { grid-template-columns: 2fr 1fr; }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th { background-color: #f8f9fa; font-weight: 600; }
        
        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .status-Healthy { background: #d4edda; color: #155724; }
        .status-IL { background: #f8d7da; color: #721c24; }

        .game-card {
            background: var(--card-bg);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .refresh-tag {
            font-size: 0.8em;
            color: var(--secondary);
            text-align: center;
            margin-top: 5px;
        }

        .log-container {
            margin-top: 40px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .log-entry:last-child { border-bottom: none; }
        
        /* Updated to handle the "Pos -> Pos" length */
        .pos-label { 
            font-weight: bold; 
            color: var(--primary); 
            min-width: 100px; 
            display: inline-block; 
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Fantasy Baseball Auto Pilot</h1>
        <div id="roster-date" style="margin-top: 5px; color: var(--text);"></div>
        <div id="last-updated" class="refresh-tag"></div>
    </header>

    <div class="grid">
        <section>
            <h2>Active Lineup</h2>
